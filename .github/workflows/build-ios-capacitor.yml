name: Build iOS Capacitor App

on:
  push:
    branches: [main]
    paths:
      - webapp/**
      - .github/workflows/build-ios-capacitor.yml
  pull_request:
    paths:
      - webapp/**
      - .github/workflows/build-ios-capacitor.yml
  workflow_dispatch:

jobs:
  ios-build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: webapp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: node ./scripts/build-web.mjs

      - name: Prepare iOS project
        run: |
          if [ ! -d ios/App ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Debug - Check if secret exists
        run: |
          if [ -n "${{ secrets.MOBILEPROVISION_BASE64 }}" ]; then
            echo "Secret exists and has length: ${#MOBILEPROVISION_BASE64}"
          else
            echo "Secret is EMPTY or not set"
            exit 1
          fi
        env:
          MOBILEPROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}          

      # ========== CODE SIGNING SETUP ==========
      - name: Setup provisioning profile
        run: |
          echo "${{ secrets.MOBILEPROVISION_BASE64 }}" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          file profile.mobileprovision
      
      - name: Setup certificate
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > certificate.p12
          security create-keychain -p temp build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp build.keychain
          security import certificate.p12 -k build.keychain -P ${{ secrets.P12_PASSWORD }} -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:apple: -s -k temp build.keychain
      # ========== END CODE SIGNING SETUP ==========

      - name: Archive iOS app (signed)
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            DEVELOPMENT_TEAM=${{ secrets.TEAM_ID }} \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="GitHubActions_AppStore_Profile" \
            PRODUCT_BUNDLE_IDENTIFIER="ac.clarity.blecommissioning" \
            archive

      - name: Diagnose provisioning profiles
        run: |
          echo "=== Available provisioning profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          echo ""
          echo "=== Profile contents ==="
          for profile in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            echo "Profile: $(basename "$profile")"
            security cms -D -i "$profile" | grep -A1 "Name\|UUID\|TeamName\|AppIDName"
            echo "---"
          done
          echo ""
          echo "=== Installed certificates ==="
          security find-identity -v -p codesigning

      - name: Show bundle IDs
        run: |
          echo "=== App bundle ID ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" ios/App/App/Info.plist
          echo ""
          echo "=== Profile bundle ID ==="
          security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | grep -A1 "application-identifier" | tail -1 | tr -d '[:space:]' | sed 's/<string>//' | sed 's/<\/string>//'          
          
      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${{ secrets.TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>ac.clarity.blecommissioning</key>
                  <string>GitHubActions_AppStore_Profile</string>
              </dict>
          </dict>
          </plist>
          EOF
          
          /usr/bin/xcrun xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -verbose
      
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ runner.temp }}/export/App.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      # Optional: Keep your archive as artifact for debugging
      - name: Upload archive (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcarchive
          path: ${{ runner.temp }}/App.xcarchive
