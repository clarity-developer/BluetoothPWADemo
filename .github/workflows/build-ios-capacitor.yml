name: Build iOS Capacitor App

on:
  push:
    branches: [main]
    paths:
      - webapp/package.json
      - webapp/package-lock.json
      - webapp/ios/**
      - .github/workflows/build-ios-capacitor.yml
  pull_request:
    paths:
      - webapp/package.json
      - webapp/package-lock.json
      - webapp/ios/**
      - .github/workflows/build-ios-capacitor.yml
  workflow_dispatch:

jobs:
  ios-build:
    runs-on: macos-latest

    env:
      APP_STORE_CONNECT_PRIVATE_KEYS_DIR: ~/.appstoreconnect/private_keys
      BUNDLE_ID: ac.clarity.blecommissioning
      PROJECT_PATH: webapp/ios/App/App.xcodeproj
      SCHEME: App
      TEAM_ID: ${{ secrets.TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install JavaScript dependencies
        working-directory: webapp
        run: npm ci

      - name: Install App Store Connect API key
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "${APPSTORE_PRIVATE_KEY}" > "$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8"
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Install signing certificate
        if: github.event_name != 'pull_request'
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/distribution.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "${P12_BASE64}" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        env:
          KEYCHAIN_PASSWORD: temporary-ci-keychain-password
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}

      - name: Install provisioning profile
        if: github.event_name != 'pull_request'
        run: |
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"

          printf '%s' "${MOBILEPROVISION_BASE64}" | base64 --decode > "$PROFILE_PATH"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST")

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed provisioning profile: $PROFILE_NAME ($PROFILE_UUID)"
        env:
          MOBILEPROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}

      - name: Archive app
        run: |
          SIGNING_ARGS=()
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            SIGNING_ARGS=(
              CODE_SIGN_STYLE=Manual
              DEVELOPMENT_TEAM="$TEAM_ID"
              PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME"
              CODE_SIGN_IDENTITY="Apple Distribution"
            )
          fi

          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -skipPackagePluginValidation \
            "${SIGNING_ARGS[@]}"

      - name: Create export options
        if: github.event_name != 'pull_request'
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF_PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF_PLIST

      - name: Export IPA
        if: github.event_name != 'pull_request'
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -skipPackagePluginValidation

          IPA_PATH=$(find "$RUNNER_TEMP/export" -name '*.ipa' -type f | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA was exported"
            find "$RUNNER_TEMP/export" -maxdepth 3 -type f -print
            exit 1
          fi
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"
          echo "Exported IPA: $IPA_PATH"

      - name: Upload to TestFlight
        if: github.event_name != 'pull_request'
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "${APPSTORE_KEY_ID}" \
            --apiIssuer "${APPSTORE_ISSUER_ID}"
        env:
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}

      - name: Upload archive artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcarchive
          path: ${{ runner.temp }}/App.xcarchive
          if-no-files-found: ignore
