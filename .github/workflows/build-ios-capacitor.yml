name: Build iOS Capacitor App

on:
  push:
    branches: [main]
    paths:
      - webapp/**
      - .github/workflows/build-ios-capacitor.yml
  pull_request:
    paths:
      - webapp/**
      - .github/workflows/build-ios-capacitor.yml
  workflow_dispatch:

jobs:
  ios-build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: webapp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: node ./scripts/build-web.mjs

      - name: Prepare iOS project
        run: |
          if [ ! -d ios/App ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Debug - Check if secret exists
        run: |
          if [ -n "${{ secrets.MOBILEPROVISION_BASE64 }}" ]; then
            echo "Secret exists and has length: ${#MOBILEPROVISION_BASE64}"
          else
            echo "Secret is EMPTY or not set"
            exit 1
          fi
        env:
          MOBILEPROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}          

      # ========== CODE SIGNING SETUP ==========
      - name: Setup provisioning profile
        run: |
          echo "${{ secrets.MOBILEPROVISION_BASE64 }}" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          file profile.mobileprovision
      
      - name: Setup certificate
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > certificate.p12
          security create-keychain -p temp build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp build.keychain
          security import certificate.p12 -k build.keychain -P ${{ secrets.P12_PASSWORD }} -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:apple: -s -k temp build.keychain
      # ========== END CODE SIGNING SETUP ==========

      # ========== FIX BUNDLE ID ==========
      - name: Fix bundle ID in Info.plist
        run: |
          cd ios/App/App
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier ac.clarity.blecommissioning" Info.plist
          echo "Bundle ID is now: ac.clarity.blecommissioning"
      
      # ========== INSTALL PROVISIONING PROFILE ==========
      - name: Install provisioning profile
        run: |
          echo "${{ secrets.MOBILEPROVISION_BASE64 }}" | base64 --decode > profile.mobileprovision
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< $(security cms -D -i profile.mobileprovision))
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "Installed profile with UUID: $PROFILE_UUID"
      
      # ========== ARCHIVE ==========
      - name: Archive iOS app
        run: |
          cd ios/App
          xcodebuild clean
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            DEVELOPMENT_TEAM=${{ secrets.TEAM_ID }} \
            PROVISIONING_PROFILE_SPECIFIER="GitHubActions_AppStore_Profile" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            CODE_SIGN_STYLE=Manual \
            ONLY_ACTIVE_ARCH=NO \
            -destination 'generic/platform=iOS' \
            | xcpretty
      
      # ========== CREATE IPA DIRECTLY ==========
      - name: Create IPA from archive
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/App.xcarchive/Products/Applications" -name "*.app" | head -1)
          echo "App found at: $APP_PATH"
          
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/Payload/"
          
          cd "$RUNNER_TEMP"
          zip -r App.ipa Payload
          
          echo "IPA created successfully"
          ls -la App.ipa
      
      # ========== UPLOAD ==========
      - name: Upload to TestFlight
        run: |
          /usr/bin/xcrun altool --upload-app \
            -f "$RUNNER_TEMP/App.ipa" \
            -t ios \
            --apiKey ${{ secrets.APPSTORE_KEY_ID }} \
            --apiIssuer ${{ secrets.APPSTORE_ISSUER_ID }}

      # Optional: Keep your archive as artifact for debugging
      - name: Upload archive (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcarchive
          path: ${{ runner.temp }}/App.xcarchive
