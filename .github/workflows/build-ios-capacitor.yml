name: Build iOS Capacitor App

on:
  push:
    branches: [main]
    paths:
      - webapp/**
      - .github/workflows/build-ios-capacitor.yml
  pull_request:
    paths:
      - webapp/**
      - .github/workflows/build-ios-capacitor.yml
  workflow_dispatch:

jobs:
  ios-build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: webapp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: node ./scripts/build-web.mjs

      - name: Prepare iOS project
        run: |
          if [ ! -d ios/App ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Debug - Check if secret exists
        run: |
          if [ -n "${{ secrets.MOBILEPROVISION_BASE64 }}" ]; then
            echo "Secret exists and has length: ${#MOBILEPROVISION_BASE64}"
          else
            echo "Secret is EMPTY or not set"
            exit 1
          fi
        env:
          MOBILEPROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}          

      # ========== CODE SIGNING SETUP ==========
      - name: Setup provisioning profile
        run: |
          echo "${{ secrets.MOBILEPROVISION_BASE64 }}" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          file profile.mobileprovision
      
      - name: Setup certificate
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > certificate.p12
          security create-keychain -p temp build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp build.keychain
          security import certificate.p12 -k build.keychain -P ${{ secrets.P12_PASSWORD }} -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:apple: -s -k temp build.keychain
      # ========== END CODE SIGNING SETUP ==========

      # ========== ARCHIVE (UNSIGNED) ==========
      - name: Archive iOS app (unsigned)
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            archive
      
      # ========== EXPORT WITH SIGNING ==========
      - name: Export IPA with distribution signing
        run: |
          # Get your bundle ID from the project
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" ios/App/App/Info.plist)
          echo "Bundle ID: $BUNDLE_ID"
          
          # Create ExportOptions.plist with verbose settings
          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>destination</key>
              <string>export</string>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${{ secrets.TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadSymbols</key>
              <true/>
              <key>provisioningProfiles</key>
              <dict>
                  <key>$BUNDLE_ID</key>
                  <string>GitHubActions_AppStore_Profile</string>
              </dict>
          </dict>
          </plist>
          EOF
          
          echo "ExportOptions.plist created:"
          cat "$RUNNER_TEMP/ExportOptions.plist"
          
          # Export with verbose output and timeout protection
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -verbose 2>&1 | tee "$RUNNER_TEMP/export.log"
          
          echo "Export completed. Checking output:"
          ls -la "$RUNNER_TEMP/export/"
      
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ runner.temp }}/export/App.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      # Optional: Keep your archive as artifact for debugging
      - name: Upload archive (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcarchive
          path: ${{ runner.temp }}/App.xcarchive
