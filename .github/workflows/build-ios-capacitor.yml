name: Build iOS Capacitor App

on:
  push:
    branches: [main]
    paths:
      - webapp/**
      - .github/workflows/build-ios-capacitor.yml
  pull_request:
    paths:
      - webapp/**
      - .github/workflows/build-ios-capacitor.yml
  workflow_dispatch:

jobs:
  ios-build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: webapp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: node ./scripts/build-web.mjs

      - name: Prepare iOS project
        run: |
          if [ ! -d ios/App ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Archive iOS app (unsigned)
        run: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcarchive
          path: ${{ runner.temp }}/App.xcarchive